syntax = "proto3";

package library;

// A library branch: catalogs books and the members who borrow them.
//
// This is the top-level container for the whole system. Leading_detached
// comments (separated by a blank line) are dropped; this paragraph and the
// one above form the message's leading comment.
message Library {
  // Human-readable name of the library branch.
  string name = 1;

  // Every book currently in the catalog, in no particular order.
  repeated Book books = 2;

  // Registered members, keyed by their member id.
  map<string, Member> members_by_id = 3;
}

// A single book in the catalog.
message Book {
  // The genre a book belongs to.
  //
  // Used for shelving and search filters.
  enum Genre {
    // Genre was never set (proto3 zero value).
    GENRE_UNSPECIFIED = 0;
    // Made-up stories.
    GENRE_FICTION = 1;
    // Factual works.
    GENRE_NONFICTION = 2;
  }

  // International Standard Book Number, 13-digit form.
  string isbn = 1;

  // Full title as printed on the cover.
  string title = 2;

  // Primary genre of the book.
  Genre genre = 3;

  // How the book can currently be obtained. Set copies_on_shelf for physical
  // stock or `ebook_url` for digital titles: bare snake_case like
  // copies_on_shelf is auto-escaped so it renders verbatim, while the
  // already-quoted `ebook_url` is left untouched.
  oneof availability {
    // Number of physical copies on the shelf; *excludes* reserved holds.
    int32 copies_on_shelf = 4;
    // URL to the e-book, if this is a digital-only title.
    string ebook_url = 5;
  }
}

// Subscription tier of a member.
enum Membership {
  // No tier selected.
  MEMBERSHIP_UNSPECIFIED = 0;
  // Standard borrowing limits.
  MEMBERSHIP_BASIC = 1;
  // Extended limits and early access.
  MEMBERSHIP_PREMIUM = 2;
}

// A person who can borrow books.
message Member {
  // Stable unique identifier.
  string id = 1;

  // Display name shown on the membership card.
  string name = 2;

  // The member's subscription tier.
  Membership tier = 3;
}
