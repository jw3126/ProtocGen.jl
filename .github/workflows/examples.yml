name: Examples
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  app-install-and-run:
    name: Install app + run addressbook example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v1
        with:
          # Pkg.Apps stabilised in 1.12; older Julia silently ignores
          # the [apps] table so there is nothing to install.
          version: "1.12"
          arch: x64
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-examples-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-examples-${{ env.cache-name }}-
            ${{ runner.os }}-examples-
            ${{ runner.os }}-
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version
      - name: Install protoc-gen-julia via Pkg.Apps
        # `Pkg.Apps.add` resolves the app's deps against the user's
        # installed registries — on a fresh runner that set is empty, so
        # add the General registry first.
        run: |
          julia --color=no -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.Apps.add(path = pwd())
          '
      - name: Add Julia bin to PATH
        run: echo "$HOME/.julia/bin" >> "$GITHUB_PATH"
      - name: Confirm app is on PATH
        run: |
          which protoc-gen-julia
          ls -l "$HOME/.julia/bin"
      - name: Run example using installed protoc-gen-julia
        # protoc auto-discovers `protoc-gen-julia` from PATH — that's
        # the binary we just installed via Pkg.Apps.add, with its own
        # self-contained dep environment. We do not invoke the dev
        # shim under bin/ (which would point at the un-instantiated
        # local checkout), so this step is a faithful test of the
        # installed-app end-user path.
        working-directory: examples
        run: |
          mkdir -p out
          protoc --julia_out=out addressbook.proto
          test -f out/addressbook_pb.jl
      - name: Round-trip the generated bindings
        # The generated file does `import ProtocGen as PB`, so the
        # smoke test needs ProtocGen loadable. Use the package's
        # own project + Pkg.instantiate to bring deps in.
        run: |
          julia --project=. --color=no -e '
            using Pkg; Pkg.instantiate()
            include("examples/out/addressbook_pb.jl")
            person = Person(
                name = "Alice",
                id = Int32(42),
                email = "alice@example.com",
                phones = [PhoneNumber(number = "+1-555-0100", type = PhoneType.PHONE_TYPE_MOBILE)],
                last_updated = google_protobuf.Timestamp(seconds = Int64(1_715_000_000)),
            )
            @assert decode(encode(person), Person) == person
            @assert decode_json(Person, encode_json(person)) == person
            println("example round-trip: OK")
          '
